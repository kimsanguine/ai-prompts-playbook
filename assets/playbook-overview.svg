<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 920" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="chainGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="25%" stop-color="#eab308"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="75%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="920" rx="20" fill="url(#bg)"/>

  <!-- ===== TITLE SECTION ===== -->
  <text x="480" y="60" text-anchor="middle" fill="#f8fafc" font-size="34" font-weight="800">🧠 AI Prompts Playbook</text>
  <text x="480" y="95" text-anchor="middle" fill="#94a3b8" font-size="17">질문의 구조가 답의 품질을 결정한다 — Chain of Thought 기반 PM 프롬프트 33개</text>

  <!-- Divider -->
  <line x1="60" y1="120" x2="900" y2="120" stroke="#334155" stroke-width="1"/>

  <!-- ===== THREE LAYERS SECTION ===== -->
  <text x="60" y="158" fill="#cbd5e1" font-size="15" font-weight="700" letter-spacing="2">세 개의 질문 — 3-LAYER COGNITIVE FRAMEWORK</text>

  <!-- Layer 1 Card -->
  <rect x="40" y="180" width="280" height="200" rx="14" fill="#0f2918" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="180" width="280" height="5" rx="2.5" fill="url(#g1)"/>
  <text x="70" y="218" fill="#22c55e" font-size="26">⚡</text>
  <text x="102" y="218" fill="#f8fafc" font-size="19" font-weight="700">Layer 1: 전문가의 눈</text>
  <text x="70" y="252" fill="#94a3b8" font-size="15">❓ 전문가는 이 문제를 어떤 틀로 보나?</text>
  <text x="70" y="280" fill="#64748b" font-size="14">→ 전문가의 프레이밍을 빌려서 질문</text>
  <text x="70" y="306" fill="#64748b" font-size="14">→ 복사 + 붙여넣기, 5-10분</text>
  <rect x="70" y="326" width="90" height="26" rx="13" fill="#22c55e" fill-opacity="0.15"/>
  <text x="115" y="344" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="600">모든 역할</text>

  <!-- Arrow 1→2 -->
  <text x="340" y="274" fill="#64748b" font-size="13" text-anchor="middle">결과가</text>
  <text x="340" y="292" fill="#64748b" font-size="13" text-anchor="middle">피상적이면</text>
  <path d="M328 300 L340 312 L352 300" stroke="#475569" stroke-width="2" fill="none"/>

  <!-- Layer 2 Card -->
  <rect x="340" y="180" width="280" height="200" rx="14" fill="#0c1929" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="340" y="180" width="280" height="5" rx="2.5" fill="url(#g2)"/>
  <text x="370" y="218" fill="#3b82f6" font-size="26">🧠</text>
  <text x="402" y="218" fill="#f8fafc" font-size="19" font-weight="700">Layer 2: 합의 너머</text>
  <text x="370" y="252" fill="#94a3b8" font-size="15">❓ 전문가들도 답을 못 내린 부분은?</text>
  <text x="370" y="280" fill="#64748b" font-size="14">→ CoT로 논쟁 지점을 탐구</text>
  <text x="370" y="306" fill="#64748b" font-size="14">→ 교육 주석 포함, 20-30분</text>
  <rect x="370" y="326" width="120" height="26" rx="13" fill="#3b82f6" fill-opacity="0.15"/>
  <text x="430" y="344" text-anchor="middle" fill="#3b82f6" font-size="13" font-weight="600">PM / 컨설턴트</text>

  <!-- Arrow 2→3 -->
  <text x="640" y="274" fill="#64748b" font-size="13" text-anchor="middle">확신이</text>
  <text x="640" y="292" fill="#64748b" font-size="13" text-anchor="middle">필요하면</text>
  <path d="M628 300 L640 312 L652 300" stroke="#475569" stroke-width="2" fill="none"/>

  <!-- Layer 3 Card -->
  <rect x="640" y="180" width="280" height="200" rx="14" fill="#1a0c14" stroke="#f43f5e" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="640" y="180" width="280" height="5" rx="2.5" fill="url(#g3)"/>
  <text x="670" y="218" fill="#f43f5e" font-size="26">🔧</text>
  <text x="702" y="218" fill="#f8fafc" font-size="19" font-weight="700">Layer 3: 자기 검증</text>
  <text x="670" y="252" fill="#94a3b8" font-size="15">❓ 내가 이해한 걸 어떻게 테스트하나?</text>
  <text x="670" y="280" fill="#64748b" font-size="14">→ Python/SQL로 결과를 코드 검증</text>
  <text x="670" y="306" fill="#64748b" font-size="14">→ 자동화 파이프라인, 30-60분</text>
  <rect x="670" y="326" width="140" height="26" rx="13" fill="#f43f5e" fill-opacity="0.15"/>
  <text x="740" y="344" text-anchor="middle" fill="#f43f5e" font-size="13" font-weight="600">개발자 / AI엔지니어</text>

  <!-- ===== WORKFLOW CHAIN ===== -->
  <line x1="60" y1="410" x2="900" y2="410" stroke="#334155" stroke-width="1"/>
  <text x="60" y="448" fill="#cbd5e1" font-size="15" font-weight="700" letter-spacing="2">워크플로우 체이닝 — PROMPT CHAIN</text>

  <!-- Chain nodes - Row -->
  <!-- Node 1 -->
  <rect x="40" y="470" width="140" height="76" rx="10" fill="#132a15" stroke="#22c55e" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="110" y="497" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="700">🔍 analyze</text>
  <text x="110" y="518" text-anchor="middle" fill="#e2e8f0" font-size="13">경쟁사 감정 분석</text>
  <text x="110" y="536" text-anchor="middle" fill="#64748b" font-size="11">5개 페르소나 + 기회</text>

  <!-- Arrow -->
  <line x1="184" y1="508" x2="198" y2="508" stroke="#475569" stroke-width="2"/>
  <polygon points="198,504 206,508 198,512" fill="#475569"/>

  <!-- Node 2 -->
  <rect x="210" y="470" width="120" height="76" rx="10" fill="#132a15" stroke="#22c55e" stroke-width="1.2"/>
  <text x="270" y="497" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="700">🔍 analyze</text>
  <text x="270" y="518" text-anchor="middle" fill="#e2e8f0" font-size="13">문제 정의</text>
  <text x="270" y="536" text-anchor="middle" fill="#64748b" font-size="11">Problem Statement</text>

  <!-- Arrow -->
  <line x1="334" y1="508" x2="348" y2="508" stroke="#475569" stroke-width="2"/>
  <polygon points="348,504 356,508 348,512" fill="#475569"/>

  <!-- Node 3 -->
  <rect x="360" y="470" width="120" height="76" rx="10" fill="#1a1608" stroke="#eab308" stroke-width="1.2"/>
  <text x="420" y="497" text-anchor="middle" fill="#eab308" font-size="13" font-weight="700">⚖️ decide</text>
  <text x="420" y="518" text-anchor="middle" fill="#e2e8f0" font-size="13">RICE 우선순위</text>
  <text x="420" y="536" text-anchor="middle" fill="#64748b" font-size="11">점수화된 기능 목록</text>

  <!-- Arrow -->
  <line x1="484" y1="508" x2="498" y2="508" stroke="#475569" stroke-width="2"/>
  <polygon points="498,504 506,508 498,512" fill="#475569"/>

  <!-- Node 4 -->
  <rect x="510" y="470" width="120" height="76" rx="10" fill="#0c1929" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="570" y="497" text-anchor="middle" fill="#3b82f6" font-size="13" font-weight="700">🛠️ create</text>
  <text x="570" y="518" text-anchor="middle" fill="#e2e8f0" font-size="13">AI 기능 PRD</text>
  <text x="570" y="536" text-anchor="middle" fill="#64748b" font-size="11">기술 스펙 포함</text>

  <!-- Arrow -->
  <line x1="634" y1="508" x2="648" y2="508" stroke="#475569" stroke-width="2"/>
  <polygon points="648,504 656,508 648,512" fill="#475569"/>

  <!-- Node 5 -->
  <rect x="660" y="470" width="120" height="76" rx="10" fill="#190c20" stroke="#a855f7" stroke-width="1.2"/>
  <text x="720" y="497" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="700">📊 measure</text>
  <text x="720" y="518" text-anchor="middle" fill="#e2e8f0" font-size="13">AI 도입 메트릭스</text>
  <text x="720" y="536" text-anchor="middle" fill="#64748b" font-size="11">성공 지표 정의</text>

  <!-- Arrow -->
  <line x1="784" y1="508" x2="798" y2="508" stroke="#475569" stroke-width="2"/>
  <polygon points="798,504 806,508 798,512" fill="#475569"/>

  <!-- Node 6 -->
  <rect x="810" y="470" width="120" height="76" rx="10" fill="#1a0c14" stroke="#f43f5e" stroke-width="1.2"/>
  <text x="870" y="497" text-anchor="middle" fill="#f43f5e" font-size="13" font-weight="700">💬 communicate</text>
  <text x="870" y="518" text-anchor="middle" fill="#e2e8f0" font-size="13">이해관계자 정렬</text>
  <text x="870" y="536" text-anchor="middle" fill="#64748b" font-size="11">팀 승인 확보</text>

  <!-- Chain flow bar -->
  <rect x="40" y="560" width="890" height="4" rx="2" fill="url(#chainGrad)" opacity="0.6"/>

  <!-- ===== STATS SECTION ===== -->
  <line x1="60" y1="590" x2="900" y2="590" stroke="#334155" stroke-width="1"/>
  <text x="60" y="628" fill="#cbd5e1" font-size="15" font-weight="700" letter-spacing="2">한눈에 보는 플레이북</text>

  <!-- Stat Cards -->
  <rect x="40" y="650" width="170" height="90" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="125" y="690" text-anchor="middle" fill="#f8fafc" font-size="36" font-weight="800">33</text>
  <text x="125" y="718" text-anchor="middle" fill="#94a3b8" font-size="14">프롬프트</text>

  <rect x="224" y="650" width="170" height="90" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="309" y="690" text-anchor="middle" fill="#f8fafc" font-size="36" font-weight="800">5</text>
  <text x="309" y="718" text-anchor="middle" fill="#94a3b8" font-size="14">카테고리</text>

  <rect x="408" y="650" width="170" height="90" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="493" y="690" text-anchor="middle" fill="#f8fafc" font-size="32" font-weight="800">24,300+</text>
  <text x="493" y="718" text-anchor="middle" fill="#94a3b8" font-size="14">라인</text>

  <rect x="592" y="650" width="170" height="90" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="677" y="690" text-anchor="middle" fill="#f8fafc" font-size="36" font-weight="800">26</text>
  <text x="677" y="718" text-anchor="middle" fill="#94a3b8" font-size="14">Python 클래스</text>

  <rect x="776" y="650" width="154" height="90" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="853" y="688" text-anchor="middle" fill="#f8fafc" font-size="36">🇰🇷</text>
  <text x="853" y="718" text-anchor="middle" fill="#94a3b8" font-size="14">한국 PM 전용</text>

  <!-- ===== CATEGORIES ROW ===== -->
  <g transform="translate(40, 770)">
    <rect width="170" height="36" rx="8" fill="#132a15" stroke="#22c55e" stroke-width="1"/>
    <text x="85" y="24" text-anchor="middle" fill="#22c55e" font-size="14" font-weight="600">🔍 analyze (7)</text>
  </g>
  <g transform="translate(224, 770)">
    <rect width="170" height="36" rx="8" fill="#1a1608" stroke="#eab308" stroke-width="1"/>
    <text x="85" y="24" text-anchor="middle" fill="#eab308" font-size="14" font-weight="600">⚖️ decide (6)</text>
  </g>
  <g transform="translate(408, 770)">
    <rect width="170" height="36" rx="8" fill="#0c1929" stroke="#3b82f6" stroke-width="1"/>
    <text x="85" y="24" text-anchor="middle" fill="#3b82f6" font-size="14" font-weight="600">🛠️ create (9)</text>
  </g>
  <g transform="translate(592, 770)">
    <rect width="170" height="36" rx="8" fill="#190c20" stroke="#a855f7" stroke-width="1"/>
    <text x="85" y="24" text-anchor="middle" fill="#a855f7" font-size="14" font-weight="600">📊 measure (3)</text>
  </g>
  <g transform="translate(776, 770)">
    <rect width="154" height="36" rx="8" fill="#1a0c14" stroke="#f43f5e" stroke-width="1"/>
    <text x="77" y="24" text-anchor="middle" fill="#f43f5e" font-size="14" font-weight="600">💬 communicate (5)</text>
  </g>

  <!-- ===== FOOTER ===== -->
  <line x1="60" y1="835" x2="900" y2="835" stroke="#334155" stroke-width="0.5"/>
  <text x="480" y="862" text-anchor="middle" fill="#64748b" font-size="13">MIT License · v2.1 · github.com/kimsanguine/ai-prompts-playbook</text>
  <text x="480" y="885" text-anchor="middle" fill="#475569" font-size="12">Built with Chain of Thought — Korean-first, globally useful</text>
</svg>
